<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contador de Amor 💘</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
      height: 100vh;
      overflow: hidden;
      position: relative;
      color: #fff;
    }

    h1 {
      margin-top: 50px;
      font-size: 3em;
      text-shadow: 2px 2px 5px #ff6b81;
    }

    #contador {
      font-size: 2em;
      margin-top: 20px;
      text-shadow: 1px 1px 3px #ff6b81;
    }

    .corazon {
      position: absolute;
      font-size: 24px;
      animation: caer 5s linear infinite;
      pointer-events: none;
    }

    @keyframes caer {
      0% { transform: translateY(-50px) scale(1); opacity: 1; }
      100% { transform: translateY(100vh) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

<h1>Desde que somos novios 💘</h1>
<p id="contador"></p>

<script>
  let inicio = new Date("2025-07-20"); // FECHA DE INICIO DE NOVIOS

  function actualizar() {
    let ahora = new Date();
    let diff = ahora - inicio;
    let dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("contador").innerText =
      dias + " días siendo novios 💘";
  }

  setInterval(actualizar, 1000);
  actualizar(); // mostrar al cargar
