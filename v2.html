<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contador de Amor 💘</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    h1 {
      font-size: 3em;
      text-shadow: 2px 2px 5px #ff6b81;
    }

    #contador {
      font-size: 2em;
      margin-top: 20px;
      text-shadow: 1px 1px 3px #ff6b81;
    }
  </style>
</head>
<body>

<h1>Desde que somos novios 💘</h1>
<p id="contador"></p>

<script>
  // Fecha de inicio
  let inicio = new Date("2025-07-20"); 

  function actualizar() {
    let ahora = new Date();
    let diff = ahora - inicio;

    let dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("contador").innerText =
      dias + " días siendo novios 💘";
  }

  // Actualizar cada segundo
  setInterval(actualizar, 1000);
  actualizar(); // para mostrar al cargar
</script>

</body>
</html>
